<svg xmlns="http://www.w3.org/2000/svg" width="820" height="200" viewBox="0 0 820 200" role="img" aria-label="jakarta sky, night, clear sky">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a1f"/>
      <stop offset="1" stop-color="#1b1840"/>
    </linearGradient>
    <style>
      @keyframes twinkle { 0%,100% { opacity: .2; } 50% { opacity: 1; } }
      @keyframes drift   { 0%,100% { transform: translateX(0); } 50% { transform: translateX(14px); } }
      @keyframes idle    { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
      @keyframes wiggle  { 0%,100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }
      @keyframes eyesO   { 0%,92% { opacity: 1; } 93%,100% { opacity: 0; } }
      @keyframes eyesC   { 0%,92% { opacity: 0; } 93%,100% { opacity: 1; } }
      @keyframes fall    { 0% { transform: translateY(-10px); opacity: 0; } 10% { opacity: 1; }
                            100% { transform: translateY(180px); opacity: 0; } }
      @keyframes flash   { 0%,94%,100% { opacity: 0; } 95%,97% { opacity: .5; } }
      .star  { animation: twinkle 2.6s ease-in-out infinite; }
      .cloud { animation: drift 9s ease-in-out infinite; }
      .idle  { animation: idle 1s ease-in-out infinite; }
      .ears  { animation: wiggle 1.3s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 100%; }
      .eyesO { animation: eyesO 4.2s steps(1) infinite; }
      .eyesC { animation: eyesC 4.2s steps(1) infinite; }
      .drop  { animation: fall 0.9s linear infinite; }
      .flash { animation: flash 4s linear infinite; }
      .mono  { font-family: 'Courier New', monospace; font-weight: 700; }
    </style>
  </defs>

  <rect width="820" height="200" fill="url(#sky)"/>
  <g><rect class="star" x="60" y="26" width="3" height="3" fill="#c9bcff" style="opacity:1.0;animation-delay:0.00s"/><rect class="star" x="140" y="46" width="3" height="3" fill="#c9bcff" style="opacity:1.0;animation-delay:0.31s"/><rect class="star" x="230" y="22" width="3" height="3" fill="#c9bcff" style="opacity:1.0;animation-delay:0.62s"/><rect class="star" x="320" y="52" width="3" height="3" fill="#c9bcff" style="opacity:1.0;animation-delay:0.93s"/><rect class="star" x="460" y="24" width="3" height="3" fill="#c9bcff" style="opacity:1.0;animation-delay:1.24s"/><rect class="star" x="560" y="44" width="3" height="3" fill="#c9bcff" style="opacity:1.0;animation-delay:1.55s"/><rect class="star" x="650" y="30" width="3" height="3" fill="#c9bcff" style="opacity:1.0;animation-delay:1.86s"/><rect class="star" x="740" y="50" width="3" height="3" fill="#c9bcff" style="opacity:1.0;animation-delay:2.17s"/><rect class="star" x="110" y="62" width="3" height="3" fill="#c9bcff" style="opacity:1.0;animation-delay:2.48s"/><rect class="star" x="690" y="64" width="3" height="3" fill="#c9bcff" style="opacity:1.0;animation-delay:2.79s"/></g>
  <g transform="translate(700,40)"><circle cx="0" cy="0" r="16" fill="#f2eecb"/><circle cx="6" cy="-4" r="14" fill="#0a0a1f"/></g>
  
  
  

  <rect x="0" y="170" width="820" height="30" fill="#241c46"/>
  <rect x="0" y="170" width="820" height="4"  fill="#3d3270"/>

  <text class="mono" x="22" y="32" font-size="13" fill="#8b7fd6">jakarta &#183; 22:48 wib</text>
  <text class="mono" x="22" y="50" font-size="11" fill="#5a4f8a">26&#176;c &#183; clear sky</text>
  
  <g transform="translate(366,92) scale(1.4)">
   <g class="idle">
    <ellipse cx="30" cy="58" rx="27" ry="5" fill="#0a0a1f" opacity="0.35"/>
    
    <g class="ears">
      <rect x="9"  y="-12" width="6"  height="6" fill="#5f3fc0"/>
      <rect x="6"  y="-6"  width="12" height="6" fill="#5f3fc0"/>
      <rect x="45" y="-12" width="6"  height="6" fill="#5f3fc0"/>
      <rect x="42" y="-6"  width="12" height="6" fill="#5f3fc0"/>
    </g>
    <g fill="#8a63e8">
      <rect x="15" y="0"  width="30" height="6"/>
      <rect x="9"  y="6"  width="42" height="6"/>
      <rect x="3"  y="12" width="54" height="6"/>
      <rect x="0"  y="18" width="60" height="6"/>
      <rect x="0"  y="24" width="60" height="6"/>
      <rect x="0"  y="30" width="60" height="6"/>
      <rect x="3"  y="36" width="54" height="6"/>
      <rect x="9"  y="42" width="42" height="6"/>
    </g>
    <g fill="#7551d6">
      <rect x="9"  y="42" width="42" height="6"/>
      <rect x="3"  y="36" width="6"  height="6"/>
      <rect x="51" y="36" width="6"  height="6"/>
    </g>
    <rect x="9" y="6" width="12" height="6" fill="#a888f2"/>
    <rect x="12" y="48" width="12" height="6" fill="#5f3fc0"/>
    <rect x="36" y="48" width="12" height="6" fill="#5f3fc0"/>
    <g fill="#14103a"><rect x="15" y="24" width="6" height="3"/><rect x="39" y="24" width="6" height="3"/></g>
    <rect x="24" y="36" width="12" height="3" fill="#ffffff"/>
    <text x="66" y="6" font-family="Courier New, monospace" font-weight="700" font-size="12" fill="#8b7fd6">z z z</text>
   </g>
  </g>
  
  
</svg>
