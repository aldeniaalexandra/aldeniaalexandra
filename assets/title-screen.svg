<svg xmlns="http://www.w3.org/2000/svg" width="820" height="230" viewBox="0 0 820 230" role="img" aria-label="Aldenia's Quest - title screen">
  <defs>
    <style>
      @keyframes bob      { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes stepA    { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
      @keyframes stepB    { 0%,49% { opacity: 0; } 50%,100% { opacity: 1; } }
      @keyframes blink    { 0%,60% { opacity: 1; } 61%,100% { opacity: 0; } }
      @keyframes scroll   { from { transform: translateX(0); } to { transform: translateX(-40px); } }
      @keyframes floaty   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      @keyframes twinkle  { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
      .hero    { animation: bob 0.6s steps(2) infinite; }
      .legA    { animation: stepA 0.6s steps(1) infinite; }
      .legB    { animation: stepB 0.6s steps(1) infinite; }
      .start   { animation: blink 1.1s steps(1) infinite; }
      .ground  { animation: scroll 0.8s linear infinite; }
      .coin    { animation: floaty 1.4s ease-in-out infinite; }
      .star    { animation: twinkle 2.2s ease-in-out infinite; }
      .title   { font-family: 'Courier New', monospace; font-weight: 700; letter-spacing: 4px; }
      .sub     { font-family: 'Courier New', monospace; font-weight: 700; letter-spacing: 3px; }
    </style>
  </defs>

  <!-- screen -->
  <rect width="820" height="230" fill="#0d1117"/>
  <rect width="820" height="230" fill="none" stroke="#1f6feb" stroke-width="4"/>

  <!-- stars -->
  <g fill="#58a6ff">
    <rect class="star" x="60"  y="34" width="4" height="4" style="animation-delay:.0s"/>
    <rect class="star" x="180" y="24" width="4" height="4" style="animation-delay:.6s"/>
    <rect class="star" x="300" y="40" width="4" height="4" style="animation-delay:1.1s"/>
    <rect class="star" x="520" y="26" width="4" height="4" style="animation-delay:.3s"/>
    <rect class="star" x="640" y="44" width="4" height="4" style="animation-delay:.9s"/>
    <rect class="star" x="740" y="30" width="4" height="4" style="animation-delay:1.4s"/>
    <rect class="star" x="420" y="20" width="4" height="4" style="animation-delay:1.7s"/>
  </g>

  <!-- title -->
  <text class="title" x="410" y="86" text-anchor="middle" font-size="40" fill="#58a6ff">ALDENIA'S QUEST</text>
  <text class="sub"   x="410" y="116" text-anchor="middle" font-size="15" fill="#8b949e">~ a lifelong learner, still leveling up ~</text>

  <!-- ground -->
  <rect x="0" y="184" width="820" height="46" fill="#161b22"/>
  <g class="ground" fill="#30363d">
    <rect x="0"   y="184" width="20" height="6"/>
    <rect x="40"  y="184" width="20" height="6"/>
    <rect x="80"  y="184" width="20" height="6"/>
    <rect x="120" y="184" width="20" height="6"/>
    <rect x="160" y="184" width="20" height="6"/>
    <rect x="200" y="184" width="20" height="6"/>
    <rect x="240" y="184" width="20" height="6"/>
    <rect x="280" y="184" width="20" height="6"/>
    <rect x="320" y="184" width="20" height="6"/>
    <rect x="360" y="184" width="20" height="6"/>
    <rect x="400" y="184" width="20" height="6"/>
    <rect x="440" y="184" width="20" height="6"/>
    <rect x="480" y="184" width="20" height="6"/>
    <rect x="520" y="184" width="20" height="6"/>
    <rect x="560" y="184" width="20" height="6"/>
    <rect x="600" y="184" width="20" height="6"/>
    <rect x="640" y="184" width="20" height="6"/>
    <rect x="680" y="184" width="20" height="6"/>
    <rect x="720" y="184" width="20" height="6"/>
    <rect x="760" y="184" width="20" height="6"/>
    <rect x="800" y="184" width="20" height="6"/>
  </g>

  <!-- floating coin -->
  <g transform="translate(700,132)">
   <g class="coin">
    <rect x="0" y="0"  width="18" height="18" fill="#f1c40f"/>
    <rect x="4" y="4"  width="10" height="10" fill="#f9d64c"/>
    <rect x="8" y="4"  width="3"  height="10" fill="#d4a20b"/>
   </g>
  </g>

  <!-- hero (pixel adventurer) -->
  <g transform="translate(96,90) scale(1.3)">
   <g class="hero">
    <!-- hair -->
    <rect x="10" y="0"  width="30" height="5" fill="#2b1a0e"/>
    <rect x="5"  y="5"  width="40" height="5" fill="#2b1a0e"/>
    <!-- face -->
    <rect x="10" y="10" width="30" height="20" fill="#f2c6a0"/>
    <rect x="5"  y="10" width="5"  height="15" fill="#2b1a0e"/>
    <rect x="40" y="10" width="5"  height="15" fill="#2b1a0e"/>
    <!-- eyes -->
    <rect x="15" y="17" width="5" height="5" fill="#0d1117"/>
    <rect x="30" y="17" width="5" height="5" fill="#0d1117"/>
    <!-- body / shirt -->
    <rect x="8"  y="30" width="34" height="25" fill="#1f6feb"/>
    <rect x="8"  y="30" width="34" height="6"  fill="#388bfd"/>
    <!-- arms -->
    <rect x="0"  y="32" width="8"  height="20" fill="#f2c6a0"/>
    <rect x="42" y="32" width="8"  height="20" fill="#f2c6a0"/>
    <!-- legs frame A -->
    <g class="legA">
      <rect x="10" y="55" width="10" height="15" fill="#30363d"/>
      <rect x="30" y="55" width="10" height="12" fill="#30363d"/>
    </g>
    <!-- legs frame B -->
    <g class="legB">
      <rect x="10" y="55" width="10" height="12" fill="#30363d"/>
      <rect x="30" y="55" width="10" height="15" fill="#30363d"/>
    </g>
   </g>
  </g>

  <!-- press start -->
  <text class="start sub" x="410" y="160" text-anchor="middle" font-size="16" fill="#3fb950">&#9654; PRESS START</text>
</svg>
