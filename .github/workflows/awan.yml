name: awan profile
on:
  push:
    branches: [main, master]
    paths: ["awan.json", "characters/**"]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  awan:
    uses: aldeniaalexandra/awan/.github/workflows/profile.yml@main
    permissions:
      contents: write
    with:
      brag_over: 100
      brag_say: "i'm so excited!"
      cope_say: "...i'll fix that, promise"
      weather_lat: "-6.2088"
      weather_lon: "106.8456"
      day_say: "back at it"
      night_say: "okay... nap time, zzz"
