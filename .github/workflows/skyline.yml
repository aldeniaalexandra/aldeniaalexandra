name: skyline

on:
  push:
    branches: [main, master]
    paths: ["scripts/render_skyline.py"]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Render the sky
        run: python3 scripts/render_skyline.py

      - name: Commit the result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- assets/skyline.svg; then
            git add assets/skyline.svg
            git commit -m "chore: refresh skyline"
            git push
          else
            echo "no change"
          fi
